<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Level Eid Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}

body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
}

/* PHONE */
.phone{
width:360px;
height:720px;
border-radius:40px;
padding:10px;
background:#000;
box-shadow:0 0 80px rgba(255,215,0,0.3);
}

/* 🔥 MAIN SCREEN WITH IMAGE */
.screen{
width:100%;
height:100%;
border-radius:30px;
position:relative;
overflow:hidden;

/* ✅ YOUR IMAGE HERE */
background:url("bg.jpg") center/cover no-repeat;
}

/* 🔥 DARK OVERLAY */
.screen::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
top:0;
left:0;
}

/* 🎵 Music Button */
#musicBtn{
position:absolute;
top:15px;
right:15px;
border-radius:50%;
padding:10px;
background:rgba(255,215,0,0.2);
color:#FFD700;
border:none;
z-index:5;
cursor:pointer;
}

/* content */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
z-index:2;
}

.hidden{display:none;}

.glow{
color:#FFD700;
text-shadow:0 0 15px gold,0 0 40px rgba(255,215,0,0.6);
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#FFD700,#caa400);
color:black;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

input{
padding:10px;
border-radius:20px;
border:none;
width:80%;
margin-top:10px;
text-align:center;
}

/* ❌ FINAL SCREEN (NO IMAGE) */
#finalFull{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black; /* IMPORTANT */
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

canvas{
position:absolute;
width:100%;
height:100%;
}

.finalText{
color:#FFD700;
font-size:28px;
z-index:2;
text-shadow:0 0 25px gold;
}

</style>
</head>

<body>

<div class="phone">
<div class="screen">

<button id="musicBtn" onclick="toggleMusic()">🎵</button>

<div id="step0" class="center">
<h3 class="glow">তোমার নাম লিখো ✨</h3>
<input id="name" placeholder="তোমার নাম...">
<button onclick="start()">✨ শুরু করো</button>
</div>

<div id="step1" class="center hidden">
<h3 id="msg1" class="glow"></h3>
<button onclick="next(2)">👉 এগিয়ে যাও</button>
</div>

<div id="step2" class="center hidden">
<h3 id="msg2" class="glow"></h3>
<button onclick="nextFinal()">🎁 শেষ উপহার</button>
</div>

</div>
</div>

<!-- 🔥 FINAL (NO IMAGE) -->
<div id="finalFull">
<canvas id="fireworks"></canvas>
<h1 class="finalText">ঈদু-উল-ফিতরের শুভেচ্ছা</h1>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/21/audio_5f3d7cba9c.mp3">
</audio>

<script>

// 🎵 music
let started=false;
function toggleMusic(){
let m=document.getElementById("music");
if(!started){
m.volume=0;
m.play().catch(()=>{});
let v=0;
let i=setInterval(()=>{
v+=0.02;
m.volume=v;
if(v>=0.5) clearInterval(i);
},100);
started=true;
}else{
m.paused?m.play():m.pause();
}
}

// typing
function type(el,text){
let i=0;
el.innerHTML="";
function t(){
if(i<text.length){
el.innerHTML+=text[i++];
setTimeout(t,30);
}}
t();
}

function start(){
let name=document.getElementById("name").value||"তুমি";

document.getElementById("step0").classList.add("hidden");
document.getElementById("step1").classList.remove("hidden");

type(msg1, name+" ঈদের শুভেচ্ছা 🌙✨");
type(msg2, "তোমার জীবন হোক সুখে ভরা 💫");

toggleMusic();
}

function next(s){
document.querySelectorAll(".center").forEach(e=>e.classList.add("hidden"));
document.getElementById("step"+s).classList.remove("hidden");
}

function nextFinal(){
document.getElementById("finalFull").style.display="flex";
fireworks();
}

// 🎆 FIREWORKS (NO IMAGE BACKGROUND)
function fireworks(){
const c=document.getElementById("fireworks");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let p=[];

setInterval(()=>{
for(let i=0;i<120;i++){
p.push({
x:Math.random()*c.width,
y:Math.random()*c.height/2,
vx:Math.random()*4-2,
vy:Math.random()*4-2,
a:1
});
}
},500);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,c.width,c.height);

p.forEach((o,i)=>{
o.x+=o.vx;
o.y+=o.vy;
o.a-=0.01;

ctx.globalAlpha=o.a;
ctx.fillStyle="gold";
ctx.fillRect(o.x,o.y,2,2);

if(o.a<=0)p.splice(i,1);
});

ctx.globalAlpha=1;
requestAnimationFrame(draw);
}
draw();
}

</script>

</body>
</html>
