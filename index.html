<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Level Eid Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}

body{
background:linear-gradient(270deg,#000,#111,#000);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
}

@keyframes bgMove{
0%{background-position:0%}
100%{background-position:100%}
}

/* PHONE */
.phone{
width:360px;
height:720px;
border-radius:40px;
padding:10px;
background:#0a0a0a;
box-shadow:0 0 80px rgba(255,215,0,0.3);
}

/* ✅ UPDATED SCREEN (FULL IMAGE + EFFECTS) */
.screen{
width:100%;
height:100%;
border-radius:30px;

/* 🔥 FULL BACKGROUND IMAGE */
background: url('https://raw.githubusercontent.com/nafis1630/Eid-Gift-By-Nafis-Fuad-/refs/heads/main/bg.jpg') no-repeat center center;
background-size: cover;
background-attachment: fixed;

position:relative;
overflow:hidden;
}

/* 🌙 Glow Overlay */
.screen::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background: radial-gradient(circle at center, rgba(255,215,0,0.15), transparent 70%);
animation: glowMove 6s infinite alternate;
z-index:0;
}

@keyframes glowMove{
0%{transform:scale(1);}
100%{transform:scale(1.2);}
}

/* 🎵 Music Button */
#musicBtn{
position:absolute;
top:15px;
right:15px;
border-radius:50%;
padding:10px 12px;
font-size:16px;
background:rgba(255,215,0,0.2);
border:none;
color:#FFD700;
backdrop-filter:blur(10px);
cursor:pointer;
box-shadow:0 0 15px gold;
animation:btnGlow 2s infinite alternate;
}

@keyframes btnGlow{
from{box-shadow:0 0 10px gold;}
to{box-shadow:0 0 25px gold;}
}

/* stars */
.star{
position:absolute;
width:2px;height:2px;
background:gold;
box-shadow:0 0 10px gold;
animation:twinkle 2s infinite alternate, colorShift 4s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

@keyframes colorShift{
0%{background:gold;}
100%{background:#fff3b0;}
}

.center{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
transition:0.5s;
z-index:2;
}

.hidden{
opacity:0;
transform:translate(-50%,-30%) scale(0.9);
pointer-events:none;
}

.glow{
color:#FFD700;
text-shadow:0 0 15px gold,0 0 40px rgba(255,215,0,0.6);
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#FFD700,#caa400);
color:black;
font-weight:bold;
margin-top:20px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px gold;
}

input{
padding:10px;
border-radius:20px;
border:none;
width:80%;
margin-top:10px;
text-align:center;
}

.shake{
animation:shake .4s;
}

@keyframes shake{
0%,100%{transform:translate(-50%,-50%)}
25%{transform:translate(-55%,-50%)}
75%{transform:translate(-45%,-50%)}
}

.moon{
font-size:70px;
animation:float 4s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-25px);}
}

/* FINAL */
#finalFull{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
animation:fadeIn 1.5s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

#finalFull canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

.finalText{
color:#FFD700;
font-size:28px;
text-align:center;
padding:20px;
text-shadow:0 0 25px gold,0 0 60px gold;
animation:zoomGlow 2s ease forwards, pulse 2s infinite alternate;
z-index:2;
}

@keyframes zoomGlow{
0%{opacity:0;transform:scale(0.5);}
100%{opacity:1;transform:scale(1);}
}

@keyframes pulse{
from{text-shadow:0 0 20px gold;}
to{text-shadow:0 0 60px gold;}
}

.watermark{
position:absolute;
bottom:10px;
right:10px;
font-size:10px;
opacity:.6;
}

</style>
</head>

<body>

<div class="phone">
<div class="screen">

<button id="musicBtn" onclick="toggleMusic()">🎵</button>

<div id="stars"></div>

<div id="step0" class="center">
<h3 class="glow">তোমার নাম লিখো ✨</h3>
<input id="name" placeholder="তোমার নাম...">
<button onclick="start()">✨ শুরু করো</button>
</div>

<div id="step1" class="center hidden">
<div class="moon">🌙</div>
<h3 id="msg1" class="glow"></h3>
<button onclick="next(2)">👉 এগিয়ে যাও</button>
</div>

<div id="step2" class="center hidden">
<h3 id="msg2" class="glow"></h3>
<button onclick="nextFinal()">🎁 শেষ উপহার</button>
</div>

<div class="watermark">Crafted by MD. NAFIS FUAD</div>

</div>
</div>

<div id="finalFull">
<canvas id="fireworks"></canvas>
<h1 class="finalText">পবিত্র ঈদু-উল-ফিতরের শুভেচ্ছা</h1>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/21/audio_5f3d7cba9c.mp3">
</audio>

<audio id="click">
<source src="https://cdn.pixabay.com/audio/2022/03/10/audio_c6ccf3c89d.mp3">
</audio>

<script>

// ⭐ Stars
for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";
document.getElementById("stars").appendChild(s);
}

// 🏮 Floating Lanterns
for(let i=0;i<6;i++){
let lantern=document.createElement("div");
lantern.innerHTML="🏮";
lantern.style.position="absolute";
lantern.style.fontSize="30px";
lantern.style.left=Math.random()*100+"%";
lantern.style.top="100%";
lantern.style.opacity=0.7;
lantern.style.animation=`lanternFloat ${5+Math.random()*5}s linear infinite`;

document.querySelector(".screen").appendChild(lantern);
}

const style=document.createElement("style");
style.innerHTML=`
@keyframes lanternFloat{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}`;
document.head.appendChild(style);

// 🔊 Click
function playClick(){
document.getElementById("click").play();
if(navigator.vibrate) navigator.vibrate(30);
}

// 🎵 MUSIC
let musicStarted=false;

function startMusic(){
let music=document.getElementById("music");
music.volume=0;
music.play().then(()=>{
musicStarted=true;
fadeInMusic();
});
}

function fadeInMusic(){
let music=document.getElementById("music");
let vol=0;
let fade=setInterval(()=>{
if(vol<0.5){
vol+=0.02;
music.volume=vol;
}else clearInterval(fade);
},100);
}

function toggleMusic(){
let music=document.getElementById("music");

if(!musicStarted){
startMusic();
return;
}

if(music.paused) music.play();
else music.pause();
}

// ⌨️ Typing
function typeText(el,text,speed=30){
el.innerHTML="";
let i=0;
function typing(){
if(i<text.length){
el.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,speed);
}}
typing();
}

// 🚀 Start
function start(){
playClick();
let name=document.getElementById("name").value.trim();

if(!name){
let box=document.getElementById("step0");
box.classList.add("shake");
setTimeout(()=>box.classList.remove("shake"),400);
return;
}

step0.classList.add("hidden");
step1.classList.remove("hidden");

typeText(msg1, `${name}, এই পবিত্র ঈদের আলো তোমার জীবনে বয়ে আনুক অফুরন্ত সুখ, শান্তি আর ভালোবাসা ✨`);
typeText(msg2, `তোমার প্রতিটি দিন হোক আনন্দময়, প্রতিটি মুহূর্ত ভরে উঠুক হাসিতে। ঈদ তোমার জীবনে নতুন আশার সূচনা করুক 🌙💫`);

startMusic();
}

// 👉 Next
function next(step){
playClick();
document.querySelectorAll(".center").forEach(e=>e.classList.add("hidden"));
document.getElementById("step"+step).classList.remove("hidden");
}

// 🎆 Final
function nextFinal(){
playClick();
finalFull.style.display="flex";
startFireworks();
}

// 🎇 Fireworks
function startFireworks(){
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();

let particles=[];

function explode(){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<200;i++){
let angle=Math.random()*Math.PI*2;
let speed=Math.random()*6;

particles.push({
x,y,
vx:Math.cos(angle)*speed,
vy:Math.sin(angle)*speed,
alpha:1,
decay:0.01,
color:`hsl(${Math.random()*60+40},100%,60%)`
});
}
}

function animate(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{
p.x+=p.vx;
p.y+=p.vy;
p.vy+=0.03;
p.alpha-=p.decay;

ctx.globalAlpha=p.alpha;
ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fill();

if(p.alpha<=0) particles.splice(i,1);
});

ctx.globalAlpha=1;
requestAnimationFrame(animate);
}

setInterval(explode,700);
animate();
}

</script>

</body>
</html>
