<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Level Eid Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}

body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
}

/* PHONE */
.phone{
width:360px;
height:720px;
border-radius:40px;
padding:10px;
background:#000;
box-shadow:0 0 80px rgba(255,215,0,0.5);
}

/* CALLIGRAPHY BG */
.screen{
width:100%;
height:100%;
border-radius:30px;
position:relative;
overflow:hidden;

background:
linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1609599006353-e629aaabfeae?q=80&w=1200&auto=format&fit=crop');

background-size:cover;
background-position:center;
}

/* center */
.center{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
z-index:2;
transition:0.5s;
}
.hidden{
opacity:0;
transform:translate(-50%,-30%) scale(0.8);
pointer-events:none;
}

/* TEXT */
.glow{
font-size:18px;
font-weight:600;
background:linear-gradient(270deg,#FFD700,#fff,#FFD700,#ffae00);
background-size:400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glowMove 6s linear infinite;
text-shadow:0 0 20px rgba(255,215,0,0.6);
}
@keyframes glowMove{
0%{background-position:0%}
100%{background-position:100%}
}

/* button */
button{
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#FFD700,#caa400);
color:black;
font-weight:bold;
margin-top:20px;
cursor:pointer;
transition:.3s;
}
button:hover{
transform:scale(1.1);
box-shadow:0 0 20px gold;
}

input{
padding:10px;
border-radius:20px;
border:none;
width:80%;
margin-top:10px;
text-align:center;
}

/* SHAKE */
.shake{animation:shake 0.5s;}
@keyframes shake{
0%{transform:translate(-50%,-50%)}
20%{transform:translate(-60%,-50%)}
40%{transform:translate(-40%,-50%)}
60%{transform:translate(-55%,-50%)}
80%{transform:translate(-45%,-50%)}
100%{transform:translate(-50%,-50%)}
}

/* FINAL MODERN */
#finalFull{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:radial-gradient(circle at center,#000 40%,#020202 100%);
z-index:9999;
overflow:hidden;
}

/* ✨ PARTICLES (existing) */
.particle{
position:absolute;
width:3px;
height:3px;
background:#FFD700;
border-radius:50%;
opacity:0.6;
animation:floatUp linear infinite;
}
@keyframes floatUp{
from{transform:translateY(100vh);opacity:0;}
to{transform:translateY(-10vh);opacity:1;}
}

/* 💎 PREMIUM TEXT (same) */
.finalText{
font-size:32px;
font-weight:700;
text-align:center;
z-index:2;

background:linear-gradient(270deg,#FFD700,#fff,#FFD700,#ffae00,#fff);
background-size:400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:
gradientMove 6s linear infinite,
glowPulse 2.5s ease-in-out infinite,
fadeZoom 1.5s ease;
}

@keyframes gradientMove{
0%{background-position:0%}
100%{background-position:100%}
}

@keyframes glowPulse{
0%,100%{text-shadow:0 0 10px gold,0 0 20px gold;}
50%{text-shadow:0 0 25px gold,0 0 50px gold;}
}

@keyframes fadeZoom{
0%{opacity:0;transform:scale(0.6);}
100%{opacity:1;transform:scale(1);}
}

/* 🌙 MOON */
.moon{
position:absolute;
top:25%;
width:140px;
height:140px;
border-radius:50%;
background:radial-gradient(circle,#fff,#ddd,#aaa);
box-shadow:0 0 60px rgba(255,255,255,0.6);
opacity:0;
transform:scale(0.5);
}

/* ☁ CLOUD */
.cloud{
position:absolute;
width:180px;
height:60px;
background:rgba(255,255,255,0.08);
border-radius:50px;
filter:blur(8px);
animation:cloudMove 25s linear infinite;
}
@keyframes cloudMove{
from{transform:translateX(-200px);}
to{transform:translateX(120vw);}
}

/* ✨ RAYS */
.ray{
position:absolute;
width:2px;
height:120px;
background:linear-gradient(to top,transparent,gold);
top:25%;
opacity:0;
}

/* 🌟 SPARK */
.spark{
position:absolute;
width:4px;
height:4px;
background:gold;
border-radius:50%;
opacity:0;
}

.watermark{
position:absolute;
bottom:10px;
right:10px;
font-size:10px;
opacity:.6;
}

</style>
</head>

<body>

<div class="phone">
<div class="screen">

<div id="step0" class="center">
<h3 class="glow">তোমার নাম লিখো ✨</h3>
<input id="name" placeholder="তোমার নাম...">
<button onclick="start()">✨ শুরু করো</button>
</div>

<div id="step1" class="center hidden">
<h3 id="msg1" class="glow"></h3>
<button onclick="next(2)">👉 এগিয়ে যাও</button>
</div>

<div id="step2" class="center hidden">
<h3 id="msg2" class="glow"></h3>
<button onclick="nextFinal()">🎁 শেষ উপহার</button>
</div>

<div class="watermark">Crafted by MD. NAFIS FUAD</div>

</div>
</div>

<!-- FINAL -->
<div id="finalFull">
<div class="moon"></div>
<h1 class="finalText">পবিত্র ঈদু-উল-ফিতরের শুভেচ্ছা</h1>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
<source src="https://raw.githubusercontent.com/nafis1630/Eid-Gift-By-Nafis-Fuad-/main/Islamicsound.mp3" type="audio/mp3">
</audio>

<script>

/* 🎵 MUSIC SYSTEM */
let musicStarted = false;

function startMusic(){
let music = document.getElementById("bgMusic");

if(!musicStarted){
music.volume = 0;

music.play().then(()=>{
musicStarted = true;

let vol = 0;
let fade = setInterval(()=>{
if(vol < 0.5){
vol += 0.02;
music.volume = vol;
}else{
clearInterval(fade);
}
},100);

}).catch(()=>{});
}
}

/* particles */
function createParticles(){
for(let i=0;i<60;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(3+Math.random()*4)+"s";
document.getElementById("finalFull").appendChild(p);
}
}

/* typing */
function typeText(el, text, speed=25){
el.innerHTML="";
let i=0;
function typing(){
if(i<text.length){
el.innerHTML += text.charAt(i);
i++;
setTimeout(typing,speed);
}
}
typing();
}

/* start */
function start(){
let name=document.getElementById("name").value.trim();

if(!name){
let box=document.getElementById("step0");
box.classList.add("shake");
setTimeout(()=>box.classList.remove("shake"),500);
return;
}

startMusic();

step0.classList.add("hidden");
step1.classList.remove("hidden");

typeText(msg1, `${name}, এই পবিত্র ঈদের আলো তোমার জীবনে বয়ে আনুক অফুরন্ত সুখ, শান্তি আর ভালোবাসা ✨`);
}

/* next */
function next(step){
document.querySelectorAll(".center").forEach(e=>e.classList.add("hidden"));
document.getElementById("step"+step).classList.remove("hidden");

if(step===2){
typeText(msg2, `তোমার প্রতিটি দিন হোক আনন্দময়, প্রতিটি মুহূর্ত ভরে উঠুক হাসিতে। ঈদ তোমার জীবনে নতুন আশার সূচনা করুক 🌙💫`);
}
}

/* 🔥 UPDATED FINAL ONLY */
function nextFinal(){
let final = document.getElementById("finalFull");
final.style.display="flex";

/* 🌙 moon */
let moon = document.querySelector(".moon");
setTimeout(()=>{
moon.style.transition="all 1.5s ease";
moon.style.opacity=1;
moon.style.transform="scale(1)";
},200);

/* ☁ clouds */
for(let i=0;i<3;i++){
let c=document.createElement("div");
c.className="cloud";
c.style.top=(20+i*15)+"%";
final.appendChild(c);
}

/* ✨ rays */
for(let i=0;i<8;i++){
let ray=document.createElement("div");
ray.className="ray";
ray.style.left="50%";
ray.style.transform=`rotate(${i*45}deg)`;
final.appendChild(ray);

setTimeout(()=>{
ray.style.opacity=1;
ray.style.transition="opacity 1s ease";
},1000);
}

/* 💎 text smoother */
let text=document.querySelector(".finalText");
text.style.transform="translateY(40px)";
text.style.opacity="0";

setTimeout(()=>{
text.style.transition="all 1.2s ease";
text.style.opacity=1;
text.style.transform="translateY(0)";
},1400);

/* 🌟 spark burst */
for(let i=0;i<40;i++){
let s=document.createElement("div");
s.className="spark";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
final.appendChild(s);

setTimeout(()=>{
s.style.opacity=1;
s.style.transform="scale(1.5)";
},1500);
}

/* existing particles */
createParticles();
}

</script>

</body>
</html>
